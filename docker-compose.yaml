services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  test_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
      - test_runner_venv:/code/.venv
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TESTING=False
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REMINDER_SCHEDULER_ENABLED=false

  migrate:
    build: .
    command: sh scripts/run_migrations.sh
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    profiles:
      - tools

  reminder_scheduler:
    build: .
    volumes:
      - .:/code
    command: python -m app.services.reminder_scheduler
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TESTING=False
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  reminder_worker:
    build: .
    volumes:
      - .:/code
    command: python -m app.services.reminder_worker
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TESTING=False
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  test_runner:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    volumes:
      - .:/code
    environment:
      - TESTING=True
      - TEST_DATABASE_URL=postgresql+asyncpg://test_user:test_password@test_db:5432/test_db
    depends_on:
      test_db:
        condition: service_healthy
    command: python -m pytest -q
    profiles:
      - testing

volumes:
  postgres_data:
  test_runner_venv:
