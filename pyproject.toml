
# --- Настройки Ruff ---
[tool.ruff]
# Длина строки
line-length = 100
# Папки, которые Ruff должен игнорировать
exclude = [".git", ".venv", "venv", "__pycache__", "build", "dist", ".env", ".cache"]

[tool.ruff.lint]
# Список правил
# E, W - ошибки и ворнинги pycodestyle
# F - ошибки Pyflakes (логика, неиспользуемые переменные)
# I - Isort (сортировка импортов)
# B - Bugbear (находит вероятные баги и антипаттерны)
# C90 - Сложность кода (McCabe complexity)
# UP - Pyupgrade (предлагает современный синтаксис Python)
select = ["E", "W", "F", "I", "B", "C90", "UP"]
ignore = ["D100", "D104"] # Игнорировать отсутствие докстрингов в модулях


[tool.ruff.lint.isort]
# Группировка импортов
combine-as-imports = true
lines-after-imports = 2

[tool.ruff.format]
# Настройки форматирования кода
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

# --- Настройки Pytest ---
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
# Показывать подробный вывод и отчет о покрытии (если установлен pytest-cov)
addopts = "-ra -q --doctest-modules"

# --- Настройки MyPy ---
[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true