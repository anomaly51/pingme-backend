name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TESTING: "True"
      TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5435/test_db
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==2.3.2

      - name: Install dependencies
        run: poetry install --with dev --no-interaction --no-ansi --no-root

      - name: Lint
        run: poetry run ruff check .

      - name: Test
        run: poetry run pytest -q

      - name: Docker build
        run: docker build .
